apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-worker
  template:
    metadata:
      labels:
        app: ml-worker
    spec:
      containers:
        - name: ml-worker
          image: ml-worker:latest
          imagePullPolicy: Never
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379"
          resources:
            requests:
              cpu: "200m"
            limits:
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["python", "-c", "import redis; redis.from_url('redis://redis-service:6379').ping()"]
            initialDelaySeconds: 20
            periodSeconds: 10
